<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>x2x5</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7fb;
      --card-bg: #ffffff;
      --text: #1d2433;
      --muted: #5f687a;
      --border: #e5e9f2;
      --shadow: 0 10px 30px rgba(20, 34, 66, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #11141b;
        --card-bg: #1a1f2b;
        --text: #eef2ff;
        --muted: #a3adc2;
        --border: #2a3142;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: block;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 24px;
    }

    main {
      width: min(960px, 100%);
      position: relative;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .lang-btn {
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .lang-btn:hover {
      color: var(--text);
      border-color: #7f9ae9;
    }

    .lang-btn.active {
      color: #fff;
      background: #365fcf;
      border-color: #365fcf;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.2rem);
    }

    .cards {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .card {
      text-decoration: none;
      color: inherit;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: block;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(43, 80, 169, 0.16);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="header">
      <h1 data-i18n="title">x2x5 Research</h1>
      <div class="toolbar">
        <button class="lang-btn active" data-lang="zh" type="button">中文</button>
        <button class="lang-btn" data-lang="en" type="button">EN</button>
      </div>
    </div>
    <section class="cards">
      <a class="card" href="https://x2x5.top/find">
        <h2 data-i18n="findTitle">Find</h2>
        <p data-i18n="findDesc">paper search website</p>
      </a>
      <a class="card" href="https://x2x5.top/write">
        <h2 data-i18n="writeTitle">Write</h2>
        <p data-i18n="writeDesc">skills for write paper</p>
      </a>
      <a class="card" href="https://x2x5.top/supervisor-web">
        <h2 data-i18n="supervisorTitle">Supervisor</h2>
        <p data-i18n="supervisorDesc">supervisor skills web cards</p>
      </a>
    </section>
  </main>
  <script>
    const I18N = {
      zh: {
        title: "x2x5 Research",
        writeTitle: "Write",
        writeDesc: "写论文的技能",
        supervisorTitle: "Supervisor",
        supervisorDesc: "博导的技能",
        findTitle: "Find",
        findDesc: "检索顶会论文"
      },
      en: {
        title: "x2x5 Research",
        writeTitle: "Write",
        writeDesc: "skills for write paper",
        supervisorTitle: "Supervisor",
        supervisorDesc: "supervisor's skills",
        findTitle: "Find",
        findDesc: "Top-conference paper retrieval"
      }
    };

    const langButtons = document.querySelectorAll(".lang-btn");
    const i18nNodes = document.querySelectorAll("[data-i18n]");
    const browserLang = navigator.language.toLowerCase();
    const defaultLang = browserLang.startsWith("zh") ? "zh" : "en";

    function setLanguage(lang) {
      const dict = I18N[lang] || I18N.en;
      i18nNodes.forEach((node) => {
        const key = node.dataset.i18n;
        if (dict[key]) node.textContent = dict[key];
      });
      langButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
      document.documentElement.lang = lang;
      localStorage.setItem("lang", lang);
    }

    langButtons.forEach((btn) => {
      btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
    });

    setLanguage(localStorage.getItem("lang") || defaultLang);
  </script>
</body>
</html>
