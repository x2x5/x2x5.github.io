<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>x2x5</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7fb;
      --card-bg: #ffffff;
      --text: #1d2433;
      --muted: #5f687a;
      --border: #e5e9f2;
      --shadow: 0 10px 30px rgba(20, 34, 66, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #11141b;
        --card-bg: #1a1f2b;
        --text: #eef2ff;
        --muted: #a3adc2;
        --border: #2a3142;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 24px;
    }

    main {
      width: min(960px, 100%);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.7rem, 3vw, 2.2rem);
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1rem;
    }

    .cards {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .card {
      text-decoration: none;
      color: inherit;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: block;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(43, 80, 169, 0.16);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>x2x5 Paper Tools</h1>
    <p class="subtitle">阅读、写作、检索论文的三个入口</p>
    <section class="cards">
      <a class="card" href="https://x2x5.top/read">
        <h2>Read</h2>
        <p>方便读论文，快速进入阅读与理解流程。</p>
      </a>
      <a class="card" href="https://x2x5.top/write">
        <h2>Write</h2>
        <p>你的 AI 提示词网站，帮助论文写作更高效。</p>
      </a>
      <a class="card" href="https://x2x5.top/find">
        <h2>Find</h2>
        <p>方便搜论文，快速定位相关文献与线索。</p>
      </a>
    </section>
  </main>
</body>
</html>
